<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wildlife Cam">
<meta name="theme-color" content="#0d1a0f">
<title>Wildlife Camera Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier New', Courier, monospace;
    background: #0d1a0f;
    color: #ddeedd;
    padding-bottom: 60px;
    -webkit-text-size-adjust: 100%;
  }
  .topbar {
    background: linear-gradient(135deg, #0a1a0d, #162a1a);
    border-bottom: 1px solid #2a4a2e;
    padding: 48px 16px 18px;
    text-align: center;
  }
  .topbar .icon { font-size: 2rem; display: block; margin-bottom: 6px; }
  .topbar h1 {
    font-size: 1.1rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #ffffff;
    font-weight: 700;
  }
  .topbar p {
    font-size: 0.65rem;
    color: #6a9a6e;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .section {
    max-width: 600px;
    margin: 0 auto 12px;
    padding: 0 14px;
  }
  .section:first-of-type { margin-top: 16px; }
  .section-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 10px 4px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card {
    background: #111f13;
    border-radius: 10px;
    border: 1px solid #1e3a22;
    overflow: hidden;
  }
  label {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 14px;
    border-bottom: 1px solid #162018;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  label:last-child { border-bottom: none; }
  label:active { background: rgba(255,255,255,0.03); }
  input[type="checkbox"] { display: none; }
  .box {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 5px;
    border: 2px solid #2a4a30;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 900;
    color: #0d1a0f;
    transition: all 0.15s;
  }
  .text {
    font-size: 0.82rem;
    line-height: 1.4;
    color: #b8d4ba;
  }

  /* Section colours */
  .s1 input:checked ~ .box { background: #7EC8A0; border-color: #7EC8A0; }
  .s2 input:checked ~ .box { background: #F4A94E; border-color: #F4A94E; }
  .s3 input:checked ~ .box { background: #5BC8E8; border-color: #5BC8E8; }
  .s4 input:checked ~ .box { background: #C8A87E; border-color: #C8A87E; }
  .s5 input:checked ~ .box { background: #A8D870; border-color: #A8D870; }
  .s6 input:checked ~ .box { background: #E87E7E; border-color: #E87E7E; }
  .s7 input:checked ~ .box { background: #C8A8E8; border-color: #C8A8E8; }

  input:checked ~ .box::after { content: '✓'; }
  input:checked ~ .text { color: #3a5a3e; text-decoration: line-through; }

  .reset {
    text-align: center;
    padding: 28px 16px;
  }
  .reset button {
    background: transparent;
    border: 1px solid #2a4a30;
    color: #6a9a6e;
    border-radius: 6px;
    padding: 12px 32px;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Courier New', Courier, monospace;
  }
  .reset button:active { border-color: #7EC8A0; color: #7EC8A0; }
</style>
</head>
<body>

<div class="topbar">
  <span class="icon">📷</span>
  <h1>Wildlife Camera Checklist</h1>
  <p>Mirrorless · Pre-Shoot Checks</p>
</div>

<!-- 1. Camera Body -->
<div class="section">
  <div class="section-title" style="color:#7EC8A0">🎛 <span>Camera Body</span></div>
  <div class="card">
    <label class="s1"><input type="checkbox"><div class="box"></div><span class="text">Battery fully charged (charge spare too)</span></label>
    <label class="s1"><input type="checkbox"><div class="box"></div><span class="text">Spare battery in bag and charged</span></label>
    <label class="s1"><input type="checkbox"><div class="box"></div><span class="text">Memory cards formatted and inserted</span></label>
    <label class="s1"><input type="checkbox"><div class="box"></div><span class="text">Spare memory cards packed</span></label>
    <label class="s1"><input type="checkbox"><div class="box"></div><span class="text">Sensor clean — no dust spots visible</span></label>
    <label class="s1"><input type="checkbox"><div class="box"></div><span class="text">Camera body cap removed, lens fitted</span></label>
    <label class="s1"><input type="checkbox"><div class="box"></div><span class="text">Camera strap securely attached</span></label>
  </div>
</div>

<!-- 2. Lens & Optics -->
<div class="section">
  <div class="section-title" style="color:#F4A94E">🔭 <span>Lens &amp; Optics</span></div>
  <div class="card">
    <label class="s2"><input type="checkbox"><div class="box"></div><span class="text">Correct lens fitted for wildlife (200mm+)</span></label>
    <label class="s2"><input type="checkbox"><div class="box"></div><span class="text">Lens front element clean and clear</span></label>
    <label class="s2"><input type="checkbox"><div class="box"></div><span class="text">Lens hood attached to reduce flare</span></label>
    <label class="s2"><input type="checkbox"><div class="box"></div><span class="text">Image stabilisation switched ON</span></label>
    <label class="s2"><input type="checkbox"><div class="box"></div><span class="text">Autofocus confirmed working on lens switch</span></label>
    <label class="s2"><input type="checkbox"><div class="box"></div><span class="text">Spare lens packed and protected</span></label>
  </div>
</div>

<!-- 3. Exposure Settings -->
<div class="section">
  <div class="section-title" style="color:#5BC8E8">⚙️ <span>Exposure Settings</span></div>
  <div class="card">
    <label class="s3"><input type="checkbox"><div class="box"></div><span class="text">Shooting mode set (Av, Tv or Manual)</span></label>
    <label class="s3"><input type="checkbox"><div class="box"></div><span class="text">Shutter speed fast enough to freeze motion (1/1000s+)</span></label>
    <label class="s3"><input type="checkbox"><div class="box"></div><span class="text">ISO set appropriately for light conditions</span></label>
    <label class="s3"><input type="checkbox"><div class="box"></div><span class="text">Auto ISO range configured correctly</span></label>
    <label class="s3"><input type="checkbox"><div class="box"></div><span class="text">Exposure compensation reset to 0</span></label>
    <label class="s3"><input type="checkbox"><div class="box"></div><span class="text">Metering mode set (spot / evaluative)</span></label>
  </div>
</div>

<!-- 4. Focus & Drive -->
<div class="section">
  <div class="section-title" style="color:#C8A87E">🎯 <span>Focus &amp; Drive Mode</span></div>
  <div class="card">
    <label class="s4"><input type="checkbox"><div class="box"></div><span class="text">AF mode set to Continuous (AF-C / AI Servo)</span></label>
    <label class="s4"><input type="checkbox"><div class="box"></div><span class="text">Animal / subject tracking AF enabled</span></label>
    <label class="s4"><input type="checkbox"><div class="box"></div><span class="text">Eye AF enabled for subject detection</span></label>
    <label class="s4"><input type="checkbox"><div class="box"></div><span class="text">Drive mode set to High Speed Burst</span></label>
    <label class="s4"><input type="checkbox"><div class="box"></div><span class="text">Back-button focus configured (if used)</span></label>
    <label class="s4"><input type="checkbox"><div class="box"></div><span class="text">Focus limiter set on lens (if applicable)</span></label>
  </div>
</div>

<!-- 5. Image Quality -->
<div class="section">
  <div class="section-title" style="color:#A8D870">🖼 <span>Image Quality &amp; File Settings</span></div>
  <div class="card">
    <label class="s5"><input type="checkbox"><div class="box"></div><span class="text">File format set (RAW or RAW + JPEG)</span></label>
    <label class="s5"><input type="checkbox"><div class="box"></div><span class="text">White balance set (AWB or custom)</span></label>
    <label class="s5"><input type="checkbox"><div class="box"></div><span class="text">Picture profile / colour profile correct</span></label>
    <label class="s5"><input type="checkbox"><div class="box"></div><span class="text">Long exposure noise reduction off (burst shooting)</span></label>
    <label class="s5"><input type="checkbox"><div class="box"></div><span class="text">Date and time correct on camera</span></label>
  </div>
</div>

<!-- 6. Gear & Field Kit -->
<div class="section">
  <div class="section-title" style="color:#E87E7E">🎒 <span>Field Gear &amp; Kit</span></div>
  <div class="card">
    <label class="s6"><input type="checkbox"><div class="box"></div><span class="text">Tripod or monopod packed (if needed)</span></label>
    <label class="s6"><input type="checkbox"><div class="box"></div><span class="text">Bean bag / hide support packed</span></label>
    <label class="s6"><input type="checkbox"><div class="box"></div><span class="text">Rain cover / weather protection for camera</span></label>
    <label class="s6"><input type="checkbox"><div class="box"></div><span class="text">Lens cleaning kit in bag</span></label>
    <label class="s6"><input type="checkbox"><div class="box"></div><span class="text">Binoculars packed for spotting subjects</span></label>
    <label class="s6"><input type="checkbox"><div class="box"></div><span class="text">Camouflage clothing / hide worn or packed</span></label>
    <label class="s6"><input type="checkbox"><div class="box"></div><span class="text">Phone charged for maps and ID apps</span></label>
  </div>
</div>

<!-- 7. Location & Safety -->
<div class="section">
  <div class="section-title" style="color:#C8A8E8">📍 <span>Location &amp; Safety</span></div>
  <div class="card">
    <label class="s7"><input type="checkbox"><div class="box"></div><span class="text">Permission obtained for shoot location</span></label>
    <label class="s7"><input type="checkbox"><div class="box"></div><span class="text">Researched likely species and behaviour</span></label>
    <label class="s7"><input type="checkbox"><div class="box"></div><span class="text">Checked sunrise / golden hour time</span></label>
    <label class="s7"><input type="checkbox"><div class="box"></div><span class="text">Weather forecast checked</span></label>
    <label class="s7"><input type="checkbox"><div class="box"></div><span class="text">Someone knows your location and return time</span></label>
    <label class="s7"><input type="checkbox"><div class="box"></div><span class="text">Aware of wildlife safety guidelines (keep distance)</span></label>
    <label class="s7"><input type="checkbox"><div class="box"></div><span class="text">Water and snacks packed for long wait</span></label>
  </div>
</div>

<div class="reset">
  <button onclick="if(confirm('Reset all checks?')){var c=document.querySelectorAll('input[type=checkbox]');for(var i=0;i<c.length;i++)c[i].checked=false}">↺ Reset Checklist</button>
</div>

</body>
</html>
